server:
  port: 8080
  error:
    whitelabel:
      enabled: false

app:
  auth:
    token-expires-in: ${APP_AUTH_TOKEN_EXPIRES_IN:86400}

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: ${APP_AUTH_TOKEN_EXPIRES_IN:86400}
  active-timeout: -1
  is-concurrent: true
  is-share: false
  is-log: false

spring:
  application:
    name: analysis-room-platform-backend
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/analysis_room_platform_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${APP_DATASOURCE_USERNAME:root}
    password: ${APP_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: analysis-room-platform-hikari
      maximum-pool-size: ${APP_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${APP_DATASOURCE_MIN_IDLE:2}
  jackson:
    time-zone: Asia/Shanghai
  flyway:
    enabled: ${APP_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"
